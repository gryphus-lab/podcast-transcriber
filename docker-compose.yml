services:
  transcriber:
    build:
      context: .
      dockerfile: Dockerfile
      target: transcriber
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - LANGUAGE=${LANGUAGE:-en}
      - OUTPUT_DIR=/app/output
    volumes:
      - transcriber-output:/app/output
    deploy:
      resources:
        limits:
          memory: 8G

  converter:
    build:
      context: .
      dockerfile: Dockerfile
      target: converter
    ports:
      - "8001:8001"
    environment:
      - OUTPUT_DIR=/app/output
    volumes:
      - converter-output:/app/output

volumes:
  transcriber-output:
  converter-output:
